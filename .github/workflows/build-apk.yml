name: 打包拼音APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # ubuntu-22.04 有 Node 20 原生支持，兼容 setup-android
    runs-on: ubuntu-22.04

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 设置 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装 SDK 组件
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" || true

      - name: 安装 Cordova
        run: npm install -g cordova

      - name: 添加 Android 平台
        run: cordova platform add android@12

      - name: 安装项目依赖
        run: npm install

      - name: 构建 APK
        run: |
          cordova build android
          echo "=== 查找 APK ==="
          find . -name "*.apk" || echo "无APK"

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 拼音小乐园-APK
          path: |
            platforms/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn

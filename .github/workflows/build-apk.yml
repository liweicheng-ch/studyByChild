name: 打包拼音APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Android SDK (fork)
        uses: mindrunner/android-sdk-setup-action@v1
        with:
          accept-licenses: true

      - name: 看看环境
        run: |
          java -version
          node -v
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls $ANDROID_HOME/ 2>/dev/null || echo "no SDK"

      - name: npm install
        run: |
          npm install -g cordova
          cordova platform add android

      - name: 构建
        run: cordova build android 2>&1

      - name: 上传
        uses: actions/upload-artifact@v4
        with:
          name: 拼音小乐园-APK
          path: "platforms/android/app/build/outputs/apk/**/*.apk"
          if-no-files-found: warn

name: 打包拼音APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 设置 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装需要的 SDK 组件
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" || true
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "SDK installed"

      - name: 安装 Cordova
        run: npm install -g cordova

      - name: 添加 Android 平台
        run: cordova platform add android@12

      - name: 安装项目依赖
        run: npm install

      - name: 构建 APK (debug)
        run: |
          cordova build android --verbose
          echo "=== 查找 APK ==="
          find . -name "*.apk" 2>/dev/null

      - name: 收集 APK
        run: |
          mkdir -p apk-output
          find . -name "*.apk" -exec cp {} apk-output/ \; 2>/dev/null || true
          ls -la apk-output/ || echo "无APK文件"

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 拼音小乐园-APK
          path: apk-output/*.apk
          if-no-files-found: warn

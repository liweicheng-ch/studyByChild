name: 打包拼音APK

on:
  # 每次 push 到 main 分支自动打包
  push:
    branches: [ main ]
  # 也可以手动触发
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Java 17 (Android SDK 需要)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 Cordova
        run: npm install -g cordova

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3

      - name: 接受 Android 许可证
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: 添加 Android 平台
        run: cordova platform add android@12

      - name: 安装项目依赖
        run: npm install

      - name: 构建 Release APK
        run: cordova build android --release

      - name: 签名 APK (debug keystore)
        run: |
          # 用 debug 签名打包（调试用）
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks ~/.android/debug.keystore \
            --ks-pass pass:android \
            --ks-key-alias androiddebugkey \
            --key-pass pass:android \
            platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk \
            && cp platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk \
                  pinyin-app-release.apk \
            || echo "签名失败，用未签名包"
          # 如果签名失败，直接拷贝未签名包
          ls platforms/android/app/build/outputs/apk/release/*.apk 2>/dev/null || \
          cp platforms/android/app/build/outputs/apk/debug/*.apk pinyin-app-debug.apk 2>/dev/null || true

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: 拼音小乐园-APK
          path: |
            *.apk
            platforms/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn

name: 打包拼音APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Java + Node + Android SDK
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openjdk-17-jdk nodejs npm 2>&1 | tail -3
          java -version 2>&1 | head -1
          node --version

      - name: 安装 Android cmdline-tools
        run: |
          mkdir -p $HOME/android
          cd /tmp
          curl -sLo cmdline-tools.zip \
            "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          unzip -qo cmdline-tools.zip
          mv cmdline-tools $HOME/android/cmdline-tools-latest
          echo "ANDROID_HOME=$HOME/android" >> $GITHUB_ENV
          echo "$HOME/android/cmdline-tools-latest/bin" >> $GITHUB_PATH

      - name: 安装 SDK 组件
        run: |
          yes | $HOME/android/cmdline-tools-latest/bin/sdkmanager --licenses > /dev/null 2>&1
          $HOME/android/cmdline-tools-latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" 2>&1 | tail -5
          echo "SDK_HOME=$HOME/android" >> $GITHUB_ENV

      - name: 安装 Cordova
        run: sudo npm install -g cordova

      - name: 添加 Android 平台
        run: cordova platform add android@12

      - name: 安装项目依赖
        run: npm install

      - name: 构建 APK
        run: |
          cordova build android --verbose 2>&1 | tail -30
          echo "=== APK查找 ==="
          find . -name "*.apk" 2>/dev/null || echo "无APK"

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 拼音小乐园-APK
          path: "platforms/android/app/build/outputs/apk/**/*.apk"
          if-no-files-found: warn

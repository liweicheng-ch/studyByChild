name: 打包拼音APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 Cordova
        run: npm install -g cordova

      - name: 安装 Android SDK (cmdline-tools)
        run: |
          # 下载 cmdline-tools
          cd /tmp
          curl -sL -o cmdline-tools.zip \
            https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q cmdline-tools.zip
          mkdir -p $HOME/android/cmdline-tools
          mv cmdline-tools $HOME/android/cmdline-tools/latest
          echo "ANDROID_HOME=$HOME/android" >> $GITHUB_ENV
          echo "$HOME/android/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: 接受许可证 + 安装 SDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools" > /dev/null 2>&1 || true

      - name: 添加 Android 平台
        run: |
          cordova platform add android

      - name: 安装项目依赖
        run: npm install

      - name: 构建 APK
        run: |
          cordova build android
          echo "构建完成"
          ls -la platforms/android/app/build/outputs/apk/ 2>/dev/null || true
          find . -name "*.apk" 2>/dev/null

      - name: 收集 APK
        run: |
          mkdir -p apk-output
          find . -name "*.apk" -exec cp {} apk-output/ \; 2>/dev/null || true
          ls -la apk-output/

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 拼音小乐园-APK
          path: apk-output/*.apk
          if-no-files-found: error

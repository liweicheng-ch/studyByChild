<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>拼音乐园</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="page-category" class="page active">
  <div class="header">拼音乐园</div>
  <div class="subtitle">选择分类开始学习</div>
  <div class="cat-list">
    <div class="cat-btn" onclick="selectCategory('shengmu')">
      <span class="cat-icon">🔤</span>
      <span class="cat-name">声母</span>
      <span class="cat-count">23个</span>
    </div>
    <div class="cat-btn" onclick="selectCategory('yunmu')">
      <span class="cat-icon">🎵</span>
      <span class="cat-name">韵母</span>
      <span class="cat-count">24个</span>
    </div>
    <div class="cat-btn" onclick="selectCategory('zhengti')">
      <span class="cat-icon">📖</span>
      <span class="cat-name">整体认读音节</span>
      <span class="cat-count">16个</span>
    </div>
  </div>
</div>

<div id="page-player" class="page">
  <div class="header">
    <span class="back-btn" onclick="backToCategory()">‹ 返回</span>
    <span class="header-title" id="header-title">声母</span>
  </div>
  <div class="player-area">
    <div class="nav-arrow left" onclick="prevPinyin()">‹</div>
    <div class="pinyin-display" onclick="playCurrent()">
      <div class="pinyin-big" id="pinyin-big">b</div>
      <div class="pinyin-char" id="pinyin-char">玻</div>
      <div class="pinyin-type" id="pinyin-type">声母</div>
      <div class="tap-hint">点击发声</div>
    </div>
    <div class="nav-arrow right" onclick="nextPinyin()">›</div>
  </div>
  <div class="progress-row">
    <span id="progress-text">1/23</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
  <audio id="player"></audio>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
